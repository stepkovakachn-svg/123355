<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://cnhbrasil2026.vercel.app/">
    <title>Redirecionando...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
        }
        .loader {
            color: #333;
        }
    </style>
</head>
<body>

    <div class="loader">

    <script>
        // Redirecionamento via JavaScript após 3000 milissegundos (3 segundos)

            window.location.href = "https://cnhbrasil2026.vercel.app/";
        }, 3000);
    </script>

</body>
</html>
